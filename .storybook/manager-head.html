<style>
  /* ══════════════════════════════════════════
     ABADIKAN DESIGN SYSTEM — Storybook Sidebar
  ══════════════════════════════════════════ */

  @font-face {
    font-family: 'AbadikanSans';
    src: url('/AbadikanSans.otf') format('opentype');
    font-weight: 100 900;
    font-style: normal;
  }

  /* ── Custom Remix icon box styling ── */
  [data-ri-icon-box] {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    flex-shrink: 0;
    margin-right: 6px;
    vertical-align: middle;
    background: rgba(0,0,0,0.06);
    border: 1px solid rgba(0,0,0,0.06);
  }
  /* Dark mode override */
  [class*="dark"] [data-ri-icon-box],
  .dark [data-ri-icon-box],
  [data-theme="dark"] [data-ri-icon-box] {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.06);
  }
  /* Hover: brand secondary (#d44e8c) — button is inside div[data-item-id] */
  [data-item-id^="atoms-"] button:hover [data-ri-icon-box],
  [data-item-id^="molecules-"] button:hover [data-ri-icon-box],
  [data-item-id^="organisms-"] button:hover [data-ri-icon-box] {
    background: rgba(212, 78, 140, 0.16) !important;
    border-color: rgba(212, 78, 140, 0.30) !important;
    color: rgb(212, 78, 140) !important;
  }
  /* Active / expanded */
  [data-item-id^="atoms-"][data-selected="true"] [data-ri-icon-box],
  [data-item-id^="molecules-"][data-selected="true"] [data-ri-icon-box],
  [data-item-id^="organisms-"][data-selected="true"] [data-ri-icon-box],
  [data-item-id^="atoms-"]:has(button[aria-expanded="true"]) [data-ri-icon-box],
  [data-item-id^="molecules-"]:has(button[aria-expanded="true"]) [data-ri-icon-box],
  [data-item-id^="organisms-"]:has(button[aria-expanded="true"]) [data-ri-icon-box] {
    background: rgba(212, 78, 140, 0.20) !important;
    border-color: rgba(212, 78, 140, 0.38) !important;
    color: rgb(212, 78, 140) !important;
  }
  /* Base transition */
  [data-ri-icon-box] { transition: background 0.15s, border-color 0.15s, color 0.15s; }

  /* ── Remove browser default focus outline on sidebar items ── */
  [data-item-id] button:focus-visible,
  [data-item-id] a:focus-visible {
    outline: none !important;
    box-shadow: none !important;
  }

  /* ── Hide original 4-dot icon box for our customized component items ── */
  /* Hide the SVG itself */
  [data-item-id^="atoms-"] svg[type="component"],
  [data-item-id^="molecules-"] svg[type="component"],
  [data-item-id^="organisms-"] svg[type="component"] {
    display: none !important;
  }
  /* Hide the container wrapping the SVG (may have its own bg/padding) */
  [data-item-id^="atoms-"] :has(> svg[type="component"]),
  [data-item-id^="molecules-"] :has(> svg[type="component"]),
  [data-item-id^="organisms-"] :has(> svg[type="component"]) {
    display: none !important;
  }

  /* ── Tokens ── */
  :root {
    --sx: 16px; 
    /* ── Light Mode: Neutral Putih ── */
    --s-bg:            oklch(0.98 0.005 80); /* Neutral 50 (App bg) */
    --s-border:        oklch(0.90 0.010 80); /* Neutral 200 */
    --s-border-strong: oklch(0.82 0.010 80); /* Neutral 300 */
    --s-text:          oklch(0.20 0.010 80); /* Neutral 900 */
    --s-text-sec:      oklch(0.55 0.010 80); /* Neutral 600 */
    --s-hover:         oklch(0.96 0.02 350); /* Pink hover light */
    --s-active:        oklch(0.92 0.04 350); /* Pink active light */
    --s-icon-bg:       oklch(0.95 0.008 80); /* Neutral 100 */
    --s-line:          oklch(0.90 0.010 80);
    --s-line-on:       oklch(0.60 0.18 350); /* Pink Base for active line */
    /* ── Brand Abadikan (Primary = Secondary/Pink) ── */
    --s-brand:         oklch(0.60 0.18 350); /* Pink Base */
    --s-brand-bg:      oklch(0.92 0.04 350); /* Pink Light */
  }
  [data-theme='dark'] {
    /* ── Dark Mode: Neutral Hitam ── */
    --s-bg:            oklch(0.15 0.005 80); /* Body bg dark */
    --s-border:        oklch(0.25 0.010 80); /* Border sublte dark */
    --s-border-strong: oklch(0.35 0.010 80); /* Border strong dark */
    --s-text:          oklch(0.96 0.005 80); /* Heading dark */
    --s-text-sec:      oklch(0.55 0.005 80); /* Text muted dark */
    --s-hover:         oklch(0.22 0.04 349.38); /* Pink hover dark */
    --s-active:        oklch(0.28 0.08 349.38); /* Pink active dark */
    --s-icon-bg:       oklch(0.20 0.008 80);
    --s-line:          oklch(0.30 0.010 80);
    --s-line-on:       oklch(0.68 0.16 350); /* Pink Lightish for active line */
    /* ── Brand Abadikan (Primary = Secondary/Pink) ── */
    --s-brand:         oklch(0.68 0.16 350); /* Pink Lightish (for dark bg) */
    --s-brand-bg:      oklch(0.28 0.08 349.38); /* Pink Darkish */
  }

  /* ══ MANAGER LAYOUT FIXES (Gap etc) ══ */
  html, body, #storybook-root { 
    background: var(--s-bg) !important; 
    margin: 0 !important; 
    padding: 0 !important; 
  }

  /* ══ TOOLBAR LOCALE DROPDOWN ══ */
  /* Active / selected item — scoped only to popper portal to avoid breaking search results hover */
  div[data-popper-placement] [role="option"][aria-selected="true"],
  div[data-popper-placement] [role="option"][aria-selected="true"] > div {
    border-radius: 6px !important;
    background: var(--s-brand-bg) !important;
    color: var(--s-brand) !important;
  }

  /* Resizer line / Gap fix */
  [data-testid="resizer"], [class*="resizer"] { 
    background: var(--s-border) !important;
    width: 1px !important;
    opacity: 1 !important;
    border: none !important;
    position: relative !important;
    z-index: 10 !important;
  }

  /* ══ SIDEBAR SHELL ══ */
  .sidebar-container {
    background: var(--s-bg) !important;
    border-right: none !important; /* Managed by resizer now */
    padding: 0 !important;
    width: 100% !important;
  }

  /* ══ BRAND HEADER ══ */
  .sidebar-header {
    padding: 6px var(--sx) !important;
    border-bottom: none !important;
    display: flex !important;
    align-items: center !important;
    gap: 0 !important;
  }
  .sidebar-header > div {
    flex: 1 1 0 !important;
    min-width: 0 !important;
    overflow: hidden !important;
  }
  .sidebar-header div a {
    display: flex !important;
    align-items: center !important;
    gap: 10px !important;
    font-family: 'AbadikanSans', sans-serif !important;
    font-size: 14px !important;
    font-weight: 700 !important;
    color: var(--s-text) !important;
    letter-spacing: -0.02em !important;
    text-decoration: none !important;
    white-space: nowrap !important;
    overflow: hidden !important;
    text-overflow: ellipsis !important;
    width: 100% !important;
  }
  .sidebar-header div a::before {
    content: '' !important;
    display: inline-block !important;
    flex-shrink: 0 !important;
    width: 36px !important;
    height: 36px !important;
    border-radius: 8px !important;
    background-image: url('/AbadikanLogo.svg') !important;
    background-size: cover !important;
    background-repeat: no-repeat !important;
  }
  .sidebar-header > button {
    flex-shrink: 0 !important;
    width: 30px !important;
    height: 30px !important;
    border-radius: 6px !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    background: none !important;
    border: none !important;
    color: var(--s-text-sec) !important;
    cursor: pointer !important;
    opacity: 0.5 !important;
    transition: opacity 0.15s, background 0.15s !important;
  }
  .sidebar-header > button:hover { background: var(--s-hover) !important; opacity: 1 !important; }

  /* ══ SEARCH ══ */
  .sidebar-container form {
    padding: 6px 0 !important;
    margin: 0 !important;
    border-bottom: 1px solid var(--s-border) !important;
    background: var(--s-bg) !important;
    box-sizing: border-box !important;
  }
  .search-field {
    width: calc(100% - 2 * var(--sx)) !important;
    margin: 0 var(--sx) !important;
    box-sizing: border-box !important;
    background: var(--s-bg) !important;
    border: 1px solid var(--s-border) !important;
    border-radius: 10px !important;
    display: flex !important;
    align-items: center !important;
    padding: 4px !important;
    height: auto !important;
    min-height: unset !important;
    gap: 6px !important;
    transition: border-color 0.15s, box-shadow 0.15s !important;
    overflow: hidden !important;
  }
  .search-field:focus-within {
    border-color: var(--s-border-strong) !important;
    box-shadow: 0 0 0 2px var(--s-hover) !important;
  }

  /* Search icon */
  .search-field > div:first-child {
    flex-shrink: 0 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    color: var(--s-text-sec) !important;
    width: 18px !important;
    height: 18px !important;
  }
  .search-field > div:first-child svg { width: 15px !important; height: 15px !important; }

  /* Input */
  .search-field input {
    flex: 1 1 0 !important;
    min-width: 0 !important;
    border: none !important;
    background: transparent !important;
    outline: none !important;
    box-shadow: none !important;
    font-family: 'AbadikanSans', sans-serif !important;
    font-size: 12.5px !important;
    color: var(--s-text) !important;
    padding: 0 !important;
    line-height: 1.4 !important;
  }
  .search-field input::placeholder { color: var(--s-text-sec) !important; opacity: 0.7 !important; }

  /* "/" shortcut — hide ⌘K, show "/" instead. Hide when input has value (filled state) */
  .search-field code,
  .search-field code span {
    font-size: 0 !important;
    flex-shrink: 0 !important;
  }
  .search-field code::after {
    content: '/' !important;
    font-size: 12px !important;
    font-family: 'AbadikanSans', sans-serif !important;
    color: var(--s-text-sec) !important;
    opacity: 0.55 !important;
  }
  /* Hide the "/" hint when the search has content */
  .search-field:has(input:not(:placeholder-shown)) code::after {
    display: none !important;
  }

  /* Wrapper div containing clear + filter buttons */
  .search-field > div:last-child {
    flex-shrink: 0 !important;
    display: flex !important;
    align-items: center !important;
    gap: 4px !important;
    background: none !important;
  }

  .sidebar-container label { display: none !important; }

  /* Search filled: hide the / shortcut, show clear; fix border highlight */
  .search-field:focus-within,
  .search-field:has(input:not(:placeholder-shown)) {
    border-color: var(--s-border-strong) !important;
    box-shadow: 0 0 0 2px oklch(0.93 0.008 80 / 0.5) !important;
    outline: none !important;
  }
  [data-theme='dark'] .search-field:focus-within,
  [data-theme='dark'] .search-field:has(input:not(:placeholder-shown)) {
    box-shadow: 0 0 0 2px oklch(0.26 0.010 80 / 0.6) !important;
  }
  /* Kill ANY native focus/outline styles inside search field */
  .search-field *,
  .search-field *:focus,
  .search-field *:focus-within,
  .search-field input,
  .search-field input:focus,
  .search-field input:focus-visible {
    outline: none !important;
    box-shadow: none !important;
    border: none !important;
  }

  /* Clear (X) button */
  .search-field button[aria-label="Clear search"] {
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    background: none !important;
    border: none !important;
    padding: 0 !important;
    width: 20px !important;
    height: 20px !important;
    border-radius: 50% !important;
    color: var(--s-text-sec) !important;
    cursor: pointer !important;
    opacity: 0.6 !important;
    transition: opacity 0.15s !important;
  }
  .search-field button[aria-label="Clear search"]:hover { opacity: 1 !important; }
  .search-field button[aria-label="Clear search"] svg { width: 14px !important; height: 14px !important; }

  /* Filter (Tag filters) button */
  .search-field button[aria-label="Tag filters"] {
    flex-shrink: 0 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    background: var(--s-icon-bg) !important;
    border: none !important;
    padding: 0 !important;
    width: 28px !important;
    height: 28px !important;
    border-radius: 7px !important;
    color: var(--s-text-sec) !important;
    cursor: pointer !important;
    opacity: 0.7 !important;
    transition: opacity 0.15s, transform 0.1s !important;
  }
  .search-field button[aria-label="Tag filters"]:hover { opacity: 1 !important; transform: scale(1.02) !important; }
  .search-field button[aria-label="Tag filters"]:active { transform: scale(0.96) !important; }
  .search-field button[aria-label="Tag filters"] svg { width: 14px !important; height: 14px !important; }

  /* ══ SEARCH RESULTS — align with search bar ══ */
  .sidebar-container [role="listbox"],
  .sidebar-container form + div,
  .sidebar-container form ~ div:not(.sidebar-header) {
    padding-left: var(--sx) !important;
    padding-right: var(--sx) !important;
    box-sizing: border-box !important;
  }

  /* ══ HIDE CLUTTER ══ */
  .sidebar-header + div, .css-13yxcra,
  #sidebar-bottom-wrapper, #sidebar-bottom-spacer,
  .sidebar-item a[href*="storybook-preview-wrapper"],
  .sidebar-item a[href*="storybook-root"] { display: none !important; }

  /* ══ SECTION HEADERS (ATOMS / MOLECULES / etc.) ══ */
  .sidebar-subheading {
    display: flex !important;
    align-items: center !important;
    padding: 10px var(--sx) 4px !important;
    margin: 8px 0 2px !important;
    border-top: 1px solid var(--s-border) !important;
  }
  .sidebar-subheading:first-of-type { border-top: none !important; margin-top: 2px !important; }

  .sidebar-subheading > button:first-child {
    flex: 1 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: space-between !important;
    flex-direction: row-reverse !important; /* Put Chevron on the right, Text on the left */
    padding: 0 !important;
    background: none !important;
    border: none !important;
    cursor: pointer !important;
    font-family: 'AbadikanSans', sans-serif !important;
    font-size: 10.5px !important;
    font-weight: 700 !important;
    text-transform: uppercase !important;
    letter-spacing: 0.08em !important;
    color: var(--s-text-sec) !important;
  }
  
  .sidebar-subheading-action { display: none !important; }

  /* ══ COMPONENT ROWS (Level 2) ══ */
  [data-nodetype="component"] {
    margin: 2px 8px !important;
    border-radius: 10px !important;
    background: transparent !important;
    box-shadow: none !important;
    border: none !important;
  }
  [data-nodetype="component"] > button {
    display: flex !important;
    align-items: center !important;
    justify-content: flex-start !important;
    gap: 10px !important;
    width: 100% !important;
    padding: 5px 8px !important;
    min-height: 34px !important;
    border-radius: 10px !important;
    font-family: 'AbadikanSans', sans-serif !important;
    font-size: 13px !important;
    font-weight: 500 !important;
    color: var(--s-text) !important;
    letter-spacing: -0.01em !important;
    background: none !important;
    border: none !important;
    cursor: pointer !important;
    text-align: left !important;
  }
  [data-nodetype="component"] > button:hover { background: var(--s-hover) !important; }
  [data-nodetype="component"][data-selected="true"] > button,
  [data-nodetype="component"][data-highlighted="true"] > button {
    background: var(--s-active) !important;
    font-weight: 600 !important;
  }
  /* Icon box — flex: 0 0 28px prevents flex-grow override */
  [data-nodetype="component"] > button > div {
    flex: 0 0 28px !important;
    width: 28px !important;
    height: 28px !important;
    border-radius: 6px !important;
    background: var(--s-icon-bg) !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    overflow: hidden !important;
  }
  /* Hide expand chevron arrow inside icon box */
  [data-nodetype="component"] > button > div > div:first-child {
    display: none !important;
  }
  /* Hide Storybook's generic grid SVG — replaced by custom icon below */
  [data-nodetype="component"] > button > div > svg {
    display: none !important;
  }

  /* Custom Remix icon via CSS mask — base styles */
  [data-nodetype="component"] > button > div::after {
    content: '' !important;
    display: block !important;
    width: 14px !important;
    height: 14px !important;
    background-color: var(--s-text-sec) !important;
    mask-size: contain !important;
    mask-repeat: no-repeat !important;
    mask-position: center !important;
    -webkit-mask-size: contain !important;
    -webkit-mask-repeat: no-repeat !important;
    -webkit-mask-position: center !important;
    /* fallback: shapes icon */
    mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M5 8a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm14 10a3 3 0 1 1 0-6 3 3 0 0 1 0 6zM5 22a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm10-18h6v6h-6V4z'/></svg>") !important;
    -webkit-mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M5 8a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm14 10a3 3 0 1 1 0-6 3 3 0 0 1 0 6zM5 22a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm10-18h6v6h-6V4z'/></svg>") !important;
  }

  /* ══ GENERAL / HOME ICONS ══ */
  #welcome--welcome > div::after,
  #welcome--docs > div::after,
  #welcome > div::after,
  [data-item-id="welcome--welcome"] > div::after,
  [data-item-id="welcome--docs"] > div::after,
  [data-item-id="welcome"] > div::after {
    mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M19 21H5a2 2 0 0 1-2-2V9.414a1 1 0 0 1 .293-.707l7-7a1 1 0 0 1 1.414 0l7 7a1 1 0 0 1 .293.707V19a2 2 0 0 1-2 2zm-2-2V9.586l-5-5-5 5V19h10z'/></svg>") !important;
    -webkit-mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M19 21H5a2 2 0 0 1-2-2V9.414a1 1 0 0 1 .293-.707l7-7a1 1 0 0 1 1.414 0l7 7a1 1 0 0 1 .293.707V19a2 2 0 0 1-2 2zm-2-2V9.586l-5-5-5 5V19h10z'/></svg>") !important;
  }

  /* ══ ATOMS ICONS ══ */
  /* Remove aggressive hiding — let's see what Storybook renders first */



  /* ══ WELCOME — styled as flat component row, no sub-items ══ */

  /* Wrapper: same margin/radius as component rows */
  [data-item-id="welcome"] {
    margin: 2px 8px !important;
    border-radius: 10px !important;
    background: transparent !important;
    box-shadow: none !important;
    border: none !important;
  }

  /* ══ INTERACTIVE ICON BOXES (Pink when active/hovered) ══ */
  /* Background box layer */
  [data-nodetype="component"][data-selected="true"] > button > div,
  [data-nodetype="component"] > button:hover > div,
  [data-nodetype="group"][data-selected="true"] > button > div,
  [data-nodetype="group"] > button:hover > div {
    background: var(--s-brand-bg) !important;
    border-radius: 6px !important;
  }
  /* Icon mask layer */
  [data-nodetype="component"][data-selected="true"] > button > div::after,
  [data-nodetype="component"] > button:hover > div::after,
  [data-nodetype="group"][data-selected="true"] > button > div::after,
  [data-nodetype="group"] > button:hover > div::after {
    background-color: var(--s-brand) !important;
  }
  
  /* Welcome custom icon overrides */
  [data-item-id="welcome"][data-selected="true"] > button::before,
  [data-item-id="welcome"] > button:hover::before {
    box-shadow: inset 0 0 0 100px var(--s-brand-bg) !important;
    background-color: var(--s-brand) !important; 
  }


  /* Hide ALL sub-items under Welcome (stories/docs) */
  [data-item-id="welcome"] ~ [data-nodetype="story"],
  [data-item-id="welcome"] ~ [data-nodetype="document"],
  [data-nodetype="story"][data-parent-id="welcome"],
  [data-nodetype="story"][data-parent-id="welcome--welcome"],
  [data-nodetype="document"][data-parent-id="welcome"],
  [data-nodetype="document"][data-parent-id="welcome--welcome"],
  [data-item-id="welcome--default"],
  [data-item-id="welcome--welcome"][data-nodetype="story"],
  [data-item-id="welcome--welcome"][data-nodetype="document"] {
    display: none !important;
  }

  /* Button: identical to [data-nodetype="component"] > button */
  [data-item-id="welcome"] > button {
    display: flex !important;
    align-items: center !important;
    justify-content: flex-start !important;
    gap: 10px !important;
    width: 100% !important;
    padding: 5px 8px !important;
    min-height: 34px !important;
    border-radius: 10px !important;
    font-family: 'AbadikanSans', sans-serif !important;
    font-size: 13px !important;
    font-weight: 500 !important;
    color: var(--s-text) !important;
    letter-spacing: -0.01em !important;
    background: none !important;
    border: none !important;
    cursor: pointer !important;
    text-align: left !important;
  }
  [data-item-id="welcome"] > button:hover { background: var(--s-hover) !important; }
  [data-item-id="welcome"][data-selected="true"] > button {
    background: var(--s-active) !important;
    font-weight: 600 !important;
  }

  /* Icon box via ::before — home icon on icon-bg, identical to component rows */
  [data-item-id="welcome"] > button::before {
    content: '' !important;
    display: inline-flex !important;
    flex-shrink: 0 !important;
    width: 28px !important;
    height: 28px !important;
    border-radius: 6px !important;
    background-color: var(--s-text-sec) !important;
    mask-size: 14px !important;
    mask-repeat: no-repeat !important;
    mask-position: center !important;
    -webkit-mask-size: 14px !important;

<script>
  (function() {
    // ═══════════════════════════════════════════════════════════════
    // ABADIKAN DESIGN SYSTEM — THEME SYNC ENGINE
    // Synchronizes custom Sidebar/Topbar CSS with SB Theme Toggle
    // ═══════════════════════════════════════════════════════════════

    function syncTheme() {
      try {
        let isDark = false;
        
        // 1. Check local storage
        const sbDarkMode = localStorage.getItem('sb-addon-themes-3');
        if (sbDarkMode) {
          try {
            const config = JSON.parse(sbDarkMode);
            isDark = config.current === 'dark';
          } catch (e) {}
        }
        
        // 2. Check for classes on html/body (direct SB toggle evidence)
        if (document.documentElement.classList.contains('dark') || 
            document.body.classList.contains('dark') ||
            document.documentElement.classList.contains('sb-main-dark') || 
            document.body.classList.contains('sb-main-dark')) {
          isDark = true;
        }

        const themeValue = isDark ? 'dark' : 'light';
        const currentAttr = document.documentElement.getAttribute('data-theme');
        
        if (currentAttr !== themeValue) {
          document.documentElement.setAttribute('data-theme', themeValue);
          document.body.setAttribute('data-theme', themeValue);
          // Force a repaint if needed
          window.dispatchEvent(new Event('resize'));
        }
      } catch (e) {
        console.error("Theme sync error:", e);
      }
    }

    // Initial sync
    syncTheme();

    // 1. Listen for storage changes from the theme addon
    window.addEventListener('storage', (e) => {
      if (e.key === 'sb-addon-themes-3') syncTheme();
    });

    // 2. Poll as a safety net (some browsers/Storybook versions don't trigger storage event on same tab)
    setInterval(syncTheme, 200);

    // 3. Observer for UI changes and theme class toggles
    const observer = new MutationObserver(() => {
      syncTheme();
      
      // Explicitly hunt for numeric badges in tabs to color them pink if CSS misses them
      document.querySelectorAll('button[role="tab"] *, [role="tablist"] button *').forEach(child => {
        if (!child.dataset.styledBadge) {
          const text = child.textContent.trim();
          if (text && /^\d+$/.test(text) && child.children.length === 0) {
            child.dataset.styledBadge = "true";
            child.style.setProperty('background', 'var(--s-brand-bg)', 'important');
            child.style.setProperty('color', 'var(--s-brand)', 'important');
          }
        }
      });

      // Also intercept the logo to always point to Welcome
      const homeLink = document.querySelector('.sidebar-header a[title="home"]');
      if (homeLink && !homeLink.dataset.fixedHref) {
        homeLink.dataset.fixedHref = "true";
        homeLink.addEventListener('click', (e) => {
          e.preventDefault();
          window.location.assign("/?path=/story/welcome--welcome");
        });
      }

      // Style the filter button (Tag filters) — CSS alone can't override SB's dynamic CSS
      const filterBtn = document.querySelector('.search-field button[aria-label="Tag filters"]');
      if (filterBtn && !filterBtn.dataset.styledByAbadikan) {
        filterBtn.dataset.styledByAbadikan = "true";
        const isDarkNow = document.documentElement.getAttribute('data-theme') === 'dark';
        const iconBg = isDarkNow ? 'oklch(0.24 0.010 80)' : 'oklch(0.95 0.005 80)';
        Object.assign(filterBtn.style, {
          background: iconBg,
          width: '28px',
          height: '28px',
          borderRadius: '7px',
          border: 'none',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          flexShrink: '0',
          opacity: '0.7',
          cursor: 'pointer',
          transition: 'opacity 0.15s, transform 0.1s',
          padding: '0',
        });
        filterBtn.addEventListener('mouseenter', () => { filterBtn.style.opacity = '1'; });
        filterBtn.addEventListener('mouseleave', () => { filterBtn.style.opacity = '0.7'; });
        filterBtn.addEventListener('mousedown', () => { filterBtn.style.transform = 'scale(0.96)'; });
        filterBtn.addEventListener('mouseup', () => { filterBtn.style.transform = 'scale(1)'; });
      } else if (filterBtn && filterBtn.dataset.styledByAbadikan) {
        // Update bg color for theme changes
        const isDarkNow = document.documentElement.getAttribute('data-theme') === 'dark';
        filterBtn.style.background = isDarkNow ? 'oklch(0.24 0.010 80)' : 'oklch(0.95 0.005 80)';
      }
    });

    // 4. Accordion Sidebar Engine (Observer-based Auto-collapse)
    let isCollapsing = false;
    const sidebarObserver = new MutationObserver((mutations) => {
      if (isCollapsing) return;
      
      mutations.forEach((m) => {
        const target = m.target;
        if (m.attributeName === 'aria-expanded' && target.getAttribute('aria-expanded') === 'true') {
          if (target.id && (target.classList.contains('sidebar-item') || target.hasAttribute('data-nodetype'))) {
            isCollapsing = true;
            
            setTimeout(() => {
              // 1. Find all expanded folders (aria-label="Collapse")
              // 2. Find all expanded components (button[id] that has visible children like --docs)
              const expandedDivs = document.querySelectorAll('button[aria-expanded="true"] > div:first-child, a[aria-expanded="true"] > div:first-child');
              
              expandedDivs.forEach(div => {
                const parentItem = div.parentElement;
                // Don't collapse the item we just clicked, nor its direct ancestors/descendants
                if (parentItem !== target && !parentItem.contains(target) && !target.contains(parentItem)) {
                  // Click the inner DIV exclusively. Storybook React listens to this specific div to toggle without navigating!
                  div.click();
                }
              });
              
              setTimeout(() => { isCollapsing = false; }, 50);
            }, 10);
          }
        }
      });
    });
    sidebarObserver.observe(document.body, { attributes: true, subtree: true, attributeFilter: ['aria-expanded'] });

    // Observe both html and body for attribute changes (where Storybook sets themes)
    observer.observe(document.documentElement, { attributes: true });
    observer.observe(document.body, { attributes: true, childList: true, subtree: true });
    
    // Initial redirect
    if (window.location.search === "" || window.location.search === "?path=/") {
      window.location.replace("/?path=/story/welcome--welcome");
    }
  })();
</script>
