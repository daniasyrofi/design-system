<style>
  /* ══════════════════════════════════════════
     ABADIKAN DESIGN SYSTEM — Storybook Sidebar
  ══════════════════════════════════════════ */

  @font-face {
    font-family: 'AbadikanSans';
    src: url('/AbadikanSans.otf') format('opentype');
    font-weight: 100 900;
    font-style: normal;
  }

  /* ── Tokens ── */
  :root {
    --sx: 16px;                             /* horizontal inset — all elements align here */
    --s-bg:            oklch(1 0 0);
    --s-border:        oklch(0.90 0.010 80);
    --s-border-strong: oklch(0.82 0.010 80);
    --s-text:          oklch(0.20 0.010 80);
    --s-text-sec:      oklch(0.60 0.010 80);
    --s-hover:         oklch(0.96 0.005 80);
    --s-active:        oklch(0.90 0.010 80);
    --s-icon-bg:       oklch(0.93 0.008 80);
    --s-line:          oklch(0.85 0.010 80);
    --s-line-on:       oklch(0.20 0.010 80);
  }
  [data-theme='dark'] {
    --s-bg:            oklch(0.18 0.008 80);
    --s-border:        oklch(0.28 0.010 80);
    --s-border-strong: oklch(0.35 0.010 80);
    --s-text:          oklch(0.96 0.005 80);
    --s-text-sec:      oklch(0.68 0.005 80);
    --s-hover:         oklch(0.24 0.008 80);
    --s-active:        oklch(0.30 0.010 80);
    --s-icon-bg:       oklch(0.28 0.010 80);
    --s-line:          oklch(0.32 0.010 80);
    --s-line-on:       oklch(0.90 0.005 80);
  }

  * { box-sizing: border-box; }
  body {
    font-family: 'AbadikanSans', -apple-system, BlinkMacSystemFont, sans-serif !important;
    -webkit-font-smoothing: antialiased !important;
  }

  /* ══ SIDEBAR SHELL ══ */
  .sidebar-container {
    background: var(--s-bg) !important;
    border-right: 1px solid var(--s-border) !important;
    padding: 0 !important;
  }

  /* ══ BRAND HEADER ══ */
  .sidebar-header {
    padding: 14px var(--sx) !important;
    border-bottom: 1px solid var(--s-border) !important;
    display: flex !important;
    align-items: center !important;
    gap: 0 !important;
  }
  .sidebar-header > div {
    flex: 1 1 0 !important;
    min-width: 0 !important;
    overflow: hidden !important;
  }
  .sidebar-header div a {
    display: flex !important;
    align-items: center !important;
    gap: 10px !important;
    font-family: 'AbadikanSans', sans-serif !important;
    font-size: 14px !important;
    font-weight: 700 !important;
    color: var(--s-text) !important;
    letter-spacing: -0.02em !important;
    text-decoration: none !important;
    white-space: nowrap !important;
    overflow: hidden !important;
    text-overflow: ellipsis !important;
    width: 100% !important;
  }
  .sidebar-header div a::before {
    content: '' !important;
    display: inline-block !important;
    flex-shrink: 0 !important;
    width: 36px !important;
    height: 36px !important;
    border-radius: 8px !important;
    background-image: url('/AbadikanLogo.svg') !important;
    background-size: cover !important;
    background-repeat: no-repeat !important;
  }
  .sidebar-header > button {
    flex-shrink: 0 !important;
    width: 30px !important;
    height: 30px !important;
    border-radius: 6px !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    background: none !important;
    border: none !important;
    color: var(--s-text-sec) !important;
    cursor: pointer !important;
    opacity: 0.5 !important;
    transition: opacity 0.15s, background 0.15s !important;
  }
  .sidebar-header > button:hover { background: var(--s-hover) !important; opacity: 1 !important; }

  /* ══ SEARCH ══ */
  .sidebar-container form {
    padding: 12px var(--sx) !important;
    margin: 0 !important;
    border-bottom: 1px solid var(--s-border) !important;
    background: var(--s-bg) !important;
  }
  .search-field {
    margin: 0 !important;
    width: 100% !important;
    background: var(--s-bg) !important;
    border: 1px solid var(--s-border) !important;
    border-radius: 10px !important;
    display: flex !important;
    align-items: center !important;
    padding: 0 10px !important;
    height: 36px !important;
    gap: 8px !important;
    transition: border-color 0.15s, box-shadow 0.15s !important;
  }
  .search-field:focus-within {
    border-color: var(--s-border-strong) !important;
    box-shadow: 0 0 0 2px var(--s-hover) !important;
  }

  /* Search icon */
  .search-field > div:first-child {
    flex-shrink: 0 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    color: var(--s-text-sec) !important;
    width: 18px !important;
    height: 18px !important;
  }
  .search-field > div:first-child svg { width: 15px !important; height: 15px !important; }

  /* Input */
  .search-field input {
    flex: 1 1 0 !important;
    min-width: 0 !important;
    border: none !important;
    background: transparent !important;
    outline: none !important;
    box-shadow: none !important;
    font-family: 'AbadikanSans', sans-serif !important;
    font-size: 12.5px !important;
    color: var(--s-text) !important;
    padding: 0 !important;
    height: 100% !important;
  }
  .search-field input::placeholder { color: var(--s-text-sec) !important; opacity: 0.7 !important; }

  /* "/" shortcut — hide ⌘K, show "/" instead */
  .search-field code,
  .search-field code span {
    font-size: 0 !important;
    flex-shrink: 0 !important;
  }
  .search-field code::after {
    content: '/' !important;
    font-size: 12px !important;
    font-family: 'AbadikanSans', sans-serif !important;
    color: var(--s-text-sec) !important;
    opacity: 0.55 !important;
  }

  /* Filter button — refined background */
  .search-field > div:last-child {
    flex-shrink: 0 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    background: var(--s-icon-bg) !important;
    width: 28px !important;
    height: 28px !important;
    border-radius: 7px !important;
    color: var(--s-text-sec) !important;
    cursor: pointer !important;
    opacity: 0.7 !important;
    transition: opacity 0.15s, transform 0.1s !important;
    margin-right: -2px !important;
  }
  .search-field > div:last-child:hover { opacity: 1 !important; transform: scale(1.02); }
  .search-field > div:last-child:active { transform: scale(0.96); }
  .search-field > div:last-child svg { width: 14px !important; height: 14px !important; }

  .sidebar-container label { display: none !important; }

  /* ══ HIDE CLUTTER ══ */
  .sidebar-header + div, .css-13yxcra,
  #sidebar-bottom-wrapper, #sidebar-bottom-spacer,
  [data-item-id="configure-your-project--docs"],
  .sidebar-item a[href*="storybook-preview-wrapper"],
  .sidebar-item a[href*="storybook-root"] { display: none !important; }

  /* ══ SECTION HEADERS (ATOMS / MOLECULES / etc.) ══ */
  .sidebar-subheading {
    display: flex !important;
    align-items: center !important;
    padding: 10px var(--sx) 4px !important;
    margin: 8px 0 2px !important;
    border-top: 1px solid var(--s-border) !important;
  }
  .sidebar-subheading:first-of-type { border-top: none !important; margin-top: 2px !important; }

  .sidebar-subheading > button:first-child {
    flex: 1 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: space-between !important;
    padding: 0 !important;
    background: none !important;
    border: none !important;
    cursor: pointer !important;
    font-family: 'AbadikanSans', sans-serif !important;
    font-size: 10.5px !important;
    font-weight: 700 !important;
    text-transform: uppercase !important;
    letter-spacing: 0.08em !important;
    color: var(--s-text-sec) !important;
  }
  /* Chevron to right */
  .sidebar-subheading > button:first-child > div {
    order: 2 !important;
    opacity: 0.5 !important;
    display: flex !important;
    align-items: center !important;
  }
  .sidebar-subheading-action { display: none !important; }

  /* ══ COMPONENT ROWS (Level 2) ══ */
  [data-nodetype="component"] {
    margin: 2px 8px !important;
    border-radius: 10px !important;
    background: transparent !important;
    box-shadow: none !important;
    border: none !important;
  }
  [data-nodetype="component"] > button {
    display: flex !important;
    align-items: center !important;
    justify-content: flex-start !important;
    gap: 10px !important;
    width: 100% !important;
    padding: 5px 8px !important;
    min-height: 34px !important;
    border-radius: 10px !important;
    font-family: 'AbadikanSans', sans-serif !important;
    font-size: 13px !important;
    font-weight: 500 !important;
    color: var(--s-text) !important;
    letter-spacing: -0.01em !important;
    background: none !important;
    border: none !important;
    cursor: pointer !important;
    text-align: left !important;
  }
  [data-nodetype="component"] > button:hover { background: var(--s-hover) !important; }
  [data-nodetype="component"][data-selected="true"] > button,
  [data-nodetype="component"][data-highlighted="true"] > button {
    background: var(--s-active) !important;
    font-weight: 600 !important;
  }
  /* Icon box — flex: 0 0 28px prevents flex-grow override */
  [data-nodetype="component"] > button > div {
    flex: 0 0 28px !important;
    width: 28px !important;
    height: 28px !important;
    border-radius: 6px !important;
    background: var(--s-icon-bg) !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    overflow: hidden !important;
  }
  /* Hide expand chevron arrow inside icon box */
  [data-nodetype="component"] > button > div > div:first-child {
    display: none !important;
  }
  /* Hide Storybook's generic grid SVG — replaced by custom icon below */
  [data-nodetype="component"] > button > div > svg {
    display: none !important;
  }

  /* Custom Remix icon via CSS mask — base styles */
  [data-nodetype="component"] > button > div::after {
    content: '' !important;
    display: block !important;
    width: 14px !important;
    height: 14px !important;
    background-color: var(--s-text-sec) !important;
    mask-size: contain !important;
    mask-repeat: no-repeat !important;
    mask-position: center !important;
    -webkit-mask-size: contain !important;
    -webkit-mask-repeat: no-repeat !important;
    -webkit-mask-position: center !important;
    /* fallback: shapes icon */
    mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M5 8a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm14 10a3 3 0 1 1 0-6 3 3 0 0 1 0 6zM5 22a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm10-18h6v6h-6V4z'/></svg>") !important;
    -webkit-mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M5 8a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm14 10a3 3 0 1 1 0-6 3 3 0 0 1 0 6zM5 22a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm10-18h6v6h-6V4z'/></svg>") !important;
  }

  /* ══ ATOMS ICONS ══ */
  /* Avatar → person */
  #atoms-avatar > div::after {
    mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M20 22h-2v-2a3 3 0 0 0-3-3H9a3 3 0 0 0-3 3v2H4v-2a5 5 0 0 1 5-5h6a5 5 0 0 1 5 5v2zm-8-9a6 6 0 1 1 0-12 6 6 0 0 1 0 12zm0-2a4 4 0 1 0 0-8 4 4 0 0 0 0 8z'/></svg>") !important;
    -webkit-mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M20 22h-2v-2a3 3 0 0 0-3-3H9a3 3 0 0 0-3 3v2H4v-2a5 5 0 0 1 5-5h6a5 5 0 0 1 5 5v2zm-8-9a6 6 0 1 1 0-12 6 6 0 0 1 0 12zm0-2a4 4 0 1 0 0-8 4 4 0 0 0 0 8z'/></svg>") !important;
  }
  /* Badge → tag */
  #atoms-badge > div::after {
    mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M10.9 2.1l9.899 1.415 1.414 9.9-9.192 9.192a1 1 0 0 1-1.414 0l-9.9-9.9a1 1 0 0 1 0-1.414L10.9 2.1zm.707 2.122L3.828 12l8.485 8.485 7.778-7.778-1.06-7.424-7.425-1.061zm2.12 6.364a2 2 0 1 1 2.83-2.829 2 2 0 0 1-2.83 2.829z'/></svg>") !important;
    -webkit-mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M10.9 2.1l9.899 1.415 1.414 9.9-9.192 9.192a1 1 0 0 1-1.414 0l-9.9-9.9a1 1 0 0 1 0-1.414L10.9 2.1zm.707 2.122L3.828 12l8.485 8.485 7.778-7.778-1.06-7.424-7.425-1.061zm2.12 6.364a2 2 0 1 1 2.83-2.829 2 2 0 0 1-2.83 2.829z'/></svg>") !important;
  }
  /* Button → cursor */
  #atoms-button > div::after {
    mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M13.91 12.36L17 20.854l-2.008.744-3.09-8.494-4.924 3.538L6 3l14 8.167-6.09 1.193z'/></svg>") !important;
    -webkit-mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M13.91 12.36L17 20.854l-2.008.744-3.09-8.494-4.924 3.538L6 3l14 8.167-6.09 1.193z'/></svg>") !important;
  }
  /* Checkbox → checkbox */
  #atoms-checkbox > div::after {
    mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M4 3h16a1 1 0 0 1 1 1v16a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1zm1 2v14h14V5H5zm6.003 11L6.76 11.757l1.414-1.414 2.829 2.829 5.656-5.657 1.415 1.414L11.003 16z'/></svg>") !important;
    -webkit-mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M4 3h16a1 1 0 0 1 1 1v16a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1zm1 2v14h14V5H5zm6.003 11L6.76 11.757l1.414-1.414 2.829 2.829 5.656-5.657 1.415 1.414L11.003 16z'/></svg>") !important;
  }
  /* Divider → horizontal separator */
  #atoms-divider > div::after {
    mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M2 11h2v2H2v-2zm4 0h12v2H6v-2zm14 0h2v2h-2v-2z'/></svg>") !important;
    -webkit-mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M2 11h2v2H2v-2zm4 0h12v2H6v-2zm14 0h2v2h-2v-2z'/></svg>") !important;
  }
  /* Icon → image/picture */
  #atoms-icon > div::after {
    mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M5 11.1l2-2 5.5 5.5 3.5-3.5 3 3V5H5v6.1zM5 13.929V19h3.1l2.988-2.988L7 11.929l-2 2zm6.929 5.071H19v-2.929l-3-3-2.988 2.988 2.917 2.941zM4 3h16a1 1 0 0 1 1 1v16a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z'/></svg>") !important;
    -webkit-mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M5 11.1l2-2 5.5 5.5 3.5-3.5 3 3V5H5v6.1zM5 13.929V19h3.1l2.988-2.988L7 11.929l-2 2zm6.929 5.071H19v-2.929l-3-3-2.988 2.988 2.917 2.941zM4 3h16a1 1 0 0 1 1 1v16a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z'/></svg>") !important;
  }
  /* Input → text field */
  #atoms-input > div::after {
    mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M13 6v15h-2V6H5V4h14v2z'/></svg>") !important;
    -webkit-mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M13 6v15h-2V6H5V4h14v2z'/></svg>") !important;
  }
  /* Radio → radio button */
  #atoms-radio > div::after {
    mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10zm0-2a8 8 0 1 0 0-16 8 8 0 0 0 0 16zm0-3a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-2a3 3 0 1 0 0-6 3 3 0 0 0 0 6z'/></svg>") !important;
    -webkit-mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10zm0-2a8 8 0 1 0 0-16 8 8 0 0 0 0 16zm0-3a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-2a3 3 0 1 0 0-6 3 3 0 0 0 0 6z'/></svg>") !important;
  }
  /* Spinner → loader */
  #atoms-spinner > div::after {
    mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M12 3a9 9 0 0 1 9 9h-2a7 7 0 0 0-7-7V3z'/></svg>") !important;
    -webkit-mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M12 3a9 9 0 0 1 9 9h-2a7 7 0 0 0-7-7V3z'/></svg>") !important;
  }
  /* Textarea → text block */
  #atoms-textarea > div::after {
    mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M3 3h18v2H3V3zm0 7h18v2H3v-2zm0 7h12v2H3v-2z'/></svg>") !important;
    -webkit-mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M3 3h18v2H3V3zm0 7h18v2H3v-2zm0 7h12v2H3v-2z'/></svg>") !important;
  }
  /* Toggle → switch */
  #atoms-toggle > div::after {
    mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M7 5a7 7 0 0 0 0 14h10a7 7 0 0 0 0-14H7zm0-2h10a9 9 0 0 1 0 18H7A9 9 0 0 1 7 3zm10 4a5 5 0 1 1 0 10A5 5 0 0 1 17 7z'/></svg>") !important;
    -webkit-mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M7 5a7 7 0 0 0 0 14h10a7 7 0 0 0 0-14H7zm0-2h10a9 9 0 0 1 0 18H7A9 9 0 0 1 7 3zm10 4a5 5 0 1 1 0 10A5 5 0 0 1 17 7z'/></svg>") !important;
  }

  /* ══ MOLECULES ICONS ══ */
  /* Alert → warning triangle */
  #molecules-alert > div::after {
    mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M12.866 3l9.526 16.5a1 1 0 0 1-.866 1.5H2.474a1 1 0 0 1-.866-1.5L11.134 3a1 1 0 0 1 1.732 0zm-8.66 16h15.588L12 5.5 4.206 19zM11 16h2v2h-2v-2zm0-7h2v5h-2V9z'/></svg>") !important;
    -webkit-mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M12.866 3l9.526 16.5a1 1 0 0 1-.866 1.5H2.474a1 1 0 0 1-.866-1.5L11.134 3a1 1 0 0 1 1.732 0zm-8.66 16h15.588L12 5.5 4.206 19zM11 16h2v2h-2v-2zm0-7h2v5h-2V9z'/></svg>") !important;
  }
  /* Card → layout card */
  #molecules-card > div::after {
    mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M3 3h8v8H3V3zm0 10h8v8H3v-8zm10-10h8v8h-8V3zm0 10h8v8h-8v-8zm2-8v4h4V5h-4zm0 10v4h4v-4h-4zM5 5v4h4V5H5zm0 10v4h4v-4H5z'/></svg>") !important;
    -webkit-mask-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M3 3h8v8H3V3zm0 10h8v8H3v-8zm10-10h8v8h-8V3zm0 10h8v8h-8v-8zm2-8v4h4V5h-4zm0 10v4h4v-4h-4zM5 5v4h4V5H5zm0 10v4h4v-4H5z'/></svg>") !important;
  }

  /* ══ STORY ITEMS (Level 3) ══ */
  [data-nodetype="story"],
  [data-nodetype="document"] {
    position: relative !important;
    margin: 0 !important;
    padding-left: var(--sx) !important;
    border: none !important;
    border-radius: 0 !important;
    background: transparent !important;
    box-shadow: none !important;
  }
  /* Vertical bar */
  [data-nodetype="story"]::before,
  [data-nodetype="document"]::before {
    content: '' !important;
    position: absolute !important;
    left: calc(var(--sx) + 13px) !important;
    top: 0 !important; bottom: 0 !important;
    width: 1.5px !important;
    background: var(--s-line) !important;
    border-radius: 1px !important;
    pointer-events: none !important;
  }
  [data-nodetype="story"][data-selected="true"]::before,
  [data-nodetype="document"][data-selected="true"]::before {
    background: var(--s-line-on) !important;
  }
  .sidebar-item a {
    display: flex !important;
    align-items: center !important;
    margin-left: 28px !important;
    padding: 4px 10px !important;
    min-height: 28px !important;
    border-radius: 6px !important;
    font-family: 'AbadikanSans', sans-serif !important;
    font-size: 12px !important;
    font-weight: 400 !important;
    color: var(--s-text) !important;
    text-decoration: none !important;
    transition: background 0.1s !important;
  }
  .sidebar-item a > div:first-child,
  .sidebar-item a > svg:first-child { display: none !important; }
  [data-nodetype="document"] a { color: var(--s-text-sec) !important; }
  [data-nodetype="story"]:not([data-selected="true"]):hover a,
  [data-nodetype="document"]:not([data-selected="true"]):hover a { background: var(--s-hover) !important; }
  [data-nodetype="story"][data-selected="true"] a,
  [data-nodetype="document"][data-selected="true"] a {
    background: var(--s-active) !important;
    font-weight: 600 !important;
  }

  /* ══ HIDE ACTION DOTS ══ */
  .sidebar-item > button ~ button,
  .sidebar-item > a ~ button { display: none !important; }
  
  /* ══ CONTROLS / ADDON PANEL ══ */
  [role="tabpanel"], .sb-addon-panel {
    background: var(--s-bg) !important;
  }

  /* Boolean Control (False/True Toggle Group) */
  /* Selector targets the label wrapper that Storybook uses for boolean switches */
  label:has(input[role="switch"]) {
    display: inline-flex !important;
    background: var(--s-icon-bg) !important;
    border: 1px solid var(--s-border) !important;
    border-radius: 30px !important;
    padding: 3px !important;
    gap: 0 !important;
    overflow: hidden !important;
    cursor: pointer !important;
    vertical-align: middle !important;
  }

  label:has(input[role="switch"]) input[role="switch"] {
    display: none !important;
  }

  label:has(input[role="switch"]) span {
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    height: 28px !important;
    padding: 0 16px !important;
    font-family: 'AbadikanSans', sans-serif !important;
    font-size: 11px !important;
    font-weight: 700 !important;
    text-transform: uppercase !important;
    letter-spacing: 0.05em !important;
    color: var(--s-text-sec) !important;
    border-radius: 20px !important;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1) !important;
    background: transparent !important;
  }

  /* Highlight logic for Active State */
  /* False active (input not checked) */
  label:has(input[role="switch"]) input:not(:checked) ~ span:nth-of-type(1),
  /* True active (input checked) */
  label:has(input[role="switch"]) input:checked ~ span:nth-of-type(2) {
    background: var(--s-text) !important;
    color: var(--s-bg) !important;
    box-shadow: 0 2px 6px rgba(0,0,0,0.12) !important;
  }

  label:has(input[role="switch"]):hover span:not(:active) {
    color: var(--s-text) !important;
  }
  
  /* Fix for the "black on dark" contrast issue seen in user screenshot */
  label:has(input[role="switch"]) input:not(:checked) ~ span:nth-of-type(1) { color: var(--s-bg) !important; }
  label:has(input[role="switch"]) input:checked ~ span:nth-of-type(2) { color: var(--s-bg) !important; }

  /* ══ TOOLBAR ══ */
  [role="toolbar"], #storybook-toolbar {
    background: var(--s-bg) !important;
    border-bottom: 1px solid var(--s-border) !important;
  }
  [role="tab"][aria-selected="true"] {
    box-shadow: 0 -2px 0 0 var(--s-text) inset !important;
    color: var(--s-text) !important;
  }

  /* ══ SCROLLBAR ══ */
  ::-webkit-scrollbar { width: 3px; height: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--s-border-strong); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--s-line); }
</style>
<script>
  (function() {
    // ═══════════════════════════════════════════════════════════════
    // ABADIKAN DESIGN SYSTEM — THEME SYNC ENGINE
    // Synchronizes custom Sidebar/Topbar CSS with SB Theme Toggle
    // ═══════════════════════════════════════════════════════════════

    function syncTheme() {
      // storybook-dark-mode uses localStorage as the source of truth
      const sbDarkMode = localStorage.getItem('sb-addon-themes-3');
      let isDark = false;

      if (sbDarkMode) {
        try {
          const config = JSON.parse(sbDarkMode);
          isDark = config.current === 'dark';
        } catch (e) {}
      } else {
        // Fallback to system if not set
        isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      }

      const themeValue = isDark ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', themeValue);
      
      // Force custom tokens update if they rely on data-theme attribute
      // In manager-head.html, we currently use prefers-color-scheme.
      // We will now change the CSS to use [data-theme='dark'] instead.
    }

    // Initial sync
    syncTheme();

    // Listen for storage changes (cross-tab/toggle support)
    window.addEventListener('storage', (e) => {
      if (e.key === 'sb-addon-themes-3') syncTheme();
    });

    // Mutation observer to catch attribute changes from SB Core / Addons
    const observer = new MutationObserver((mutations) => {
      mutations.forEach((mutation) => {
        if (mutation.type === 'attributes' && mutation.attributeName === 'class') {
          // Some addons toggle classes on body or html
          syncTheme();
        }
      });
    });

    observer.observe(document.documentElement, { attributes: true });
    
    // Poll because Storybook manager-api storage update is sometimes silent
    setInterval(syncTheme, 1000);
  })();
</script>
