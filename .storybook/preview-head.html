<script>
(() => {
  const TOKENS = {
    nameUpper:      { en: 'NAME',               id: 'NAMA',                               zh: '名称' },
    descUpper:      { en: 'DESCRIPTION',        id: 'DESKRIPSI',                          zh: '描述' },
    defaultUpper:   { en: 'DEFAULT',            id: 'DEFAULT',                            zh: '默认值' },
    controlUpper:   { en: 'CONTROL',            id: 'KONTROL',                            zh: '控件' },
    propsUpper:     { en: 'PROPS',              id: 'PROPERTI',                           zh: '属性' },
    eventsUpper:    { en: 'EVENTS',             id: 'EVENT',                              zh: '事件' },
    slotsUpper:     { en: 'SLOTS',              id: 'SLOT',                               zh: '插槽' },
    hideProps:      { en: 'Hide props items',   id: 'Sembunyikan item properti',          zh: '隐藏属性项' },
    hideEvents:     { en: 'Hide events items',  id: 'Sembunyikan item event',             zh: '隐藏事件项' },
    hideSlots:      { en: 'Hide slots items',   id: 'Sembunyikan item slot',              zh: '隐藏插槽项' },
    chooseOption:   { en: 'Choose option...',   id: 'Pilih opsi...',                      zh: '选择选项...' },
    setObject:      { en: 'Set object',         id: 'Atur objek',                         zh: '设置对象' },
    showCode:       { en: 'Show code',         id: 'Tampilkan kode',                     zh: '显示代码' },
    hideCode:       { en: 'Hide code',         id: 'Sembunyikan kode',                   zh: '隐藏代码' },
    copyCode:       { en: 'Copy code',         id: 'Salin kode',                         zh: '复制代码' },
    storiesHeading: { en: 'Stories',           id: 'Cerita',                             zh: '故事' },
    storyDefault:   { en: 'Default',           id: 'Bawaan',                             zh: '默认' },
    storyWithImage: { en: 'With Image',        id: 'Dengan Gambar',                      zh: '带图片' },
    storyInitials:  { en: 'Initials',          id: 'Inisial',                            zh: '姓名缩写' },
    storyIconFallback:{ en: 'Icon Fallback',   id: 'Cadangan Ikon',                      zh: '图标回退' },
    storyAllVariants: { en: 'All Variants',    id: 'Semua Varian',                       zh: '所有变体' },
    storyAllStyles: { en: 'All Styles',        id: 'Semua Gaya',                         zh: '所有样式' },
    storyAllSizes:  { en: 'All Sizes',         id: 'Semua Ukuran',                       zh: '所有尺寸' },
    storyAllStatuses:{ en: 'All Statuses',     id: 'Semua Status',                       zh: '所有状态' },
    storyShapes:    { en: 'Shapes',            id: 'Bentuk',                             zh: '形状' },
    storyAvatarGroup:{ en: 'Avatar Group',     id: 'Grup Avatar',                        zh: '头像组' },
    storyWithIcon:  { en: 'With Icon',         id: 'Dengan Ikon',                        zh: '带图标' },
    storyWithDot:   { en: 'With Dot',          id: 'Dengan Titik',                       zh: '带圆点' },
    storyRemovable: { en: 'Removable',         id: 'Dapat Dihapus',                      zh: '可移除' },
    storyFullMatrix:{ en: 'Full Matrix',       id: 'Matriks Lengkap',                    zh: '完整矩阵' },
  }

  const normalize = (text) => text.replace(/\s+/g, ' ').trim()

  const getLocale = () => {
    const fromData = document.documentElement.getAttribute('data-locale')
    if (fromData === 'id' || fromData === 'zh' || fromData === 'en') return fromData
    const fromLang = document.documentElement.lang
    if (fromLang === 'id' || fromLang === 'zh' || fromLang === 'en') return fromLang
    return 'en'
  }

  const findTokenKey = (text) => {
    for (const [key, variants] of Object.entries(TOKENS)) {
      if (Object.values(variants).includes(text)) return key
    }
    return null
  }

  const translateNode = (textNode, locale) => {
    const current = textNode.nodeValue
    if (!current) return
    const trimmed = normalize(current)
    if (!trimmed) return

    const tokenKey = findTokenKey(trimmed)
    if (!tokenKey) return

    const target = TOKENS[tokenKey][locale]
    if (!target || target === trimmed) return

    textNode.nodeValue = current.replace(trimmed, target)
  }

  const translateDocsTable = () => {
    const locale = getLocale()
    const tables = document.querySelectorAll('.docblock-argstable')
    for (const table of tables) {
      const walker = document.createTreeWalker(table, NodeFilter.SHOW_TEXT)
      let node = walker.nextNode()
      while (node) {
        translateNode(node, locale)
        node = walker.nextNode()
      }
    }
  }

  const translateTextInElements = (selector) => {
    const locale = getLocale()
    const targets = document.querySelectorAll(selector)
    for (const target of targets) {
      const walker = document.createTreeWalker(target, NodeFilter.SHOW_TEXT)
      let node = walker.nextNode()
      while (node) {
        translateNode(node, locale)
        node = walker.nextNode()
      }
    }
  }

  const isDarkMode = () => {
    const html = document.documentElement
    const body = document.body
    return html.getAttribute('data-theme') === 'dark'
      || body?.getAttribute('data-theme') === 'dark'
      || html.classList.contains('dark')
      || body?.classList.contains('dark')
      || html.classList.contains('sb-main-dark')
      || body?.classList.contains('sb-main-dark')
  }

  const applyContrast = () => {
    const dark = isDarkMode()

    const headingTargets = document.querySelectorAll(
      '.sbdocs-subtitle, .sbdocs-h2, .sbdocs-h3, .docs-story h1, .docs-story h2, .docs-story h3',
    )
    for (const node of headingTargets) {
      const el = node
      if (dark) {
        el.style.setProperty('color', '#ffffff', 'important')
      } else {
        el.style.removeProperty('color')
      }
    }

  }

  const applyRuntimePatches = () => {
    translateDocsTable()
    translateTextInElements('.sbdocs-preview > div:last-child, .sbdocs-preview-actions')
    translateTextInElements('.sbdocs-story > h3, .sbdocs-story h3, .sbdocs-content h2, .sbdocs-content h3, .sbdocs-content h4')
    applyContrast()
  }

  const schedulePatches = () => requestAnimationFrame(applyRuntimePatches)

  const bodyObserver = new MutationObserver(() => schedulePatches())
  const attrObserver = new MutationObserver((mutations) => {
    for (const mutation of mutations) {
      if (mutation.type === 'attributes') {
        schedulePatches()
        break
      }
    }
  })

  const start = () => {
    applyRuntimePatches()
    if (document.body) {
      bodyObserver.observe(document.body, {
        childList: true,
        subtree: true,
      })
      attrObserver.observe(document.body, {
        attributes: true,
        attributeFilter: ['data-theme', 'class'],
      })
    }
    attrObserver.observe(document.documentElement, {
      attributes: true,
      attributeFilter: ['data-locale', 'lang', 'data-theme', 'class'],
    })
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', start, { once: true })
  } else {
    start()
  }
})()
</script>
