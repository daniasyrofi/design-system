<style>
/* ══════════════════════════════════════════
   STORYBOOK DOCS PAGE — Scoped Overrides
   Uses design system tokens from globals.css
   Font: var(--font-display) / var(--font-ui)
   Colors: var(--color-*) — auto light/dark
══════════════════════════════════════════ */

/* ── Base ── */
body {
  font-family: var(--font-display, 'Abadikan Sans'), var(--font-ui, 'Inter'), sans-serif !important;
  color: var(--color-text-primary) !important;
  background-color: var(--color-bg) !important;
  -webkit-font-smoothing: antialiased;
}

/* ── Docs wrappers ── */
.sbdocs-wrapper,
.sbdocs-content {
  background-color: var(--color-bg) !important;
  color: var(--color-text-primary) !important;
}

/* ── Headings ── */
.sbdocs-title {
  font-family: var(--font-display), sans-serif !important;
  font-size: 34px !important;
  font-weight: 700 !important;
  color: var(--color-text-heading) !important;
  letter-spacing: -0.02em !important;
  border-bottom: none !important;
}
.sbdocs-h2 {
  font-family: var(--font-display), sans-serif !important;
  font-size: 22px !important;
  font-weight: 600 !important;
  color: var(--color-text-heading) !important;
  margin-top: 32px !important;
  border-bottom: none !important;
}
.sbdocs-h3 {
  font-family: var(--font-display), sans-serif !important;
  font-size: 17px !important;
  font-weight: 600 !important;
  color: var(--color-text-heading) !important;
}
.sbdocs-p {
  font-family: var(--font-ui), sans-serif !important;
  color: var(--color-text-secondary) !important;
  line-height: 1.65 !important;
}

/* ── Canvas preview blocks ── */
.sbdocs-preview {
  border: 1px solid var(--color-border) !important;
  border-radius: var(--radius-md) !important;
  box-shadow: none !important;
  background-color: var(--color-bg) !important;
  overflow: hidden !important;
}
.sbdocs-preview > div:first-child {
  background-color: var(--color-bg) !important;
}
.sbdocs-preview > div:last-child {
  background-color: var(--color-bg-subtle) !important;
  border-top: 1px solid var(--color-border) !important;
}
/* "Show code" / "Copy code" links — scoped to preview bar only */
.sbdocs-preview > div:last-child button,
.sbdocs-preview > div:last-child a {
  color: var(--color-text-secondary) !important;
  background: transparent !important;
  border: none !important;
}

/* ── Story wrapper — no extra bg ── */
.docs-story,
.docs-story > div {
  background: transparent !important;
}

/* ── Code ── */
.sbdocs-pre,
.sbdocs-code {
  font-family: var(--font-mono) !important;
  font-size: 13px !important;
  background-color: var(--color-bg-subtle) !important;
  border: 1px solid var(--color-border) !important;
  border-radius: var(--radius-sm) !important;
  color: var(--color-text-primary) !important;
}
.sbdocs-code { padding: 2px 5px !important; }

/* ══════════════════════
   PROPS TABLE (scoped to .docblock-argstable)
══════════════════════ */
.docblock-argstable {
  border-collapse: collapse !important;
  background: transparent !important;
  font-family: var(--font-ui), sans-serif !important;
}
.docblock-argstable thead,
.docblock-argstable tbody,
.docblock-argstable tr,
.docblock-argstable th,
.docblock-argstable td {
  background-color: var(--color-bg) !important;
  color: var(--color-text-primary) !important;
  border-color: var(--color-border) !important;
}

/* Header row (Name / Description / Default / Control) */
.docblock-argstable-head th {
  background-color: var(--color-bg-subtle) !important;
  color: var(--color-text-secondary) !important;
  font-size: 11px !important;
  font-weight: 600 !important;
  text-transform: uppercase !important;
  letter-spacing: 0.06em !important;
}

/* Category rows (PROPS / EVENTS / SLOTS) */
.docblock-argstable tr:has(td[colspan]),
.docblock-argstable td[colspan],
.docblock-argstable th[colspan] {
  background-color: var(--color-bg-subtle) !important;
  color: var(--color-text-secondary) !important;
  font-size: 11px !important;
  letter-spacing: 0.08em !important;
}
.docblock-argstable td[colspan] *,
.docblock-argstable th[colspan] * {
  background-color: transparent !important;
  color: var(--color-text-tertiary) !important;
  border: none !important;
}

/* Prop rows */
.docblock-argstable-body tr {
  border-bottom: 1px solid var(--color-border) !important;
}
.docblock-argstable-body td:first-child {
  font-weight: 500 !important;
  color: var(--color-text-primary) !important;
}
.docblock-argstable-body td:nth-child(2) {
  color: var(--color-text-secondary) !important;
}
.docblock-argstable-body td code {
  background: var(--color-bg-subtle) !important;
  color: var(--color-text-secondary) !important;
  border: 1px solid var(--color-border) !important;
  border-radius: var(--radius-sm) !important;
  font-family: var(--font-mono) !important;
  font-size: 12px !important;
  padding: 1px 4px !important;
}

/* ── Control inputs (scoped to argstable) ── */
.docblock-argstable input[type="text"],
.docblock-argstable input[type="number"],
.docblock-argstable textarea,
.docblock-argstable select {
  background-color: var(--color-surface) !important;
  color: var(--color-text-primary) !important;
  border: 1px solid var(--color-border) !important;
  border-radius: var(--radius-sm) !important;
  font-family: var(--font-ui), sans-serif !important;
}
.docblock-argstable button {
  background-color: var(--color-bg-subtle) !important;
  color: var(--color-text-secondary) !important;
  border: 1px solid var(--color-border) !important;
  border-radius: var(--radius-sm) !important;
  font-family: var(--font-ui), sans-serif !important;
}

/* ── Footer ── */
.sbdocs-footer { display: none !important; }
</style>
