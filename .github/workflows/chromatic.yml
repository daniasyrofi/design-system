name: Chromatic Visual Regression

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: chromatic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    name: Visual Regression (Chromatic)
    runs-on: ubuntu-latest
    # Skip entirely if token not configured — avoids blocking PRs
    if: ${{ secrets.CHROMATIC_PROJECT_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full git history required for Chromatic's TurboSnap baseline detection
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Publish to Chromatic — advisory only, never blocks CI
      - name: Publish to Chromatic
        uses: chromaui/action@latest
        continue-on-error: true
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          autoAcceptChanges: ${{ github.ref == 'refs/heads/main' }}
          exitZeroOnChanges: true
          onlyChanged: true
          buildScriptName: build-storybook
